<html lang="en">
<head>

<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --dark: #0D0D0D;
    --darker: #080808;
    --surface: #141414;
    --surface2: #1C1C1C;
    --text: #E8E4DC;
    --muted: #888;
    --border: rgba(201,168,76,0.2);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--darker);
    color: var(--text);
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 6%;
    background: rgba(8,8,8,0.92);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; font-weight: 700;
    color: var(--gold); letter-spacing: 0.05em;
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a {
    text-decoration: none; color: var(--muted);
    font-size: 0.82rem; letter-spacing: 0.1em; text-transform: uppercase;
    transition: color 0.25s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--gold); }
  .nav-cta {
    background: var(--gold); color: var(--dark);
    padding: 0.5rem 1.2rem; border-radius: 2px;
    font-size: 0.8rem; font-weight: 500; letter-spacing: 0.08em;
    text-decoration: none; text-transform: uppercase;
    transition: background 0.2s;
  }
  .nav-cta:hover { background: var(--gold-light); }

  /* BLOG HERO */
  .blog-hero {
    padding: 9rem 6% 4rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  .blog-hero::before {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 40%; height: 100%;
    background: radial-gradient(ellipse at 80% 50%, rgba(201,168,76,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .blog-hero-inner { max-width: 760px; }
  .hero-label {
    display: inline-block;
    font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--gold); border: 1px solid var(--border);
    padding: 0.35rem 0.9rem; border-radius: 2px; margin-bottom: 1.2rem;
  }
  .blog-hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 5vw, 4rem);
    font-weight: 900; line-height: 1.1; color: var(--text);
    margin-bottom: 1rem;
  }
  .blog-hero h1 span { color: var(--gold); }
  .blog-hero p {
    font-size: 1rem; color: var(--muted); line-height: 1.8; max-width: 540px;
  }

  /* FILTERS */
  .blog-filters {
    padding: 1.8rem 6%;
    display: flex; gap: 0.8rem; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .filter-btn {
    font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
    border: 1px solid var(--border); color: var(--muted);
    padding: 0.4rem 1rem; border-radius: 2px; cursor: pointer;
    background: none; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.05); }

  /* BLOG GRID */
  .blog-main {
    padding: 4rem 6%;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 2rem;
    align-items: start;
  }

  /* FEATURED (spans 2 cols) */
  .post-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.25s, transform 0.25s;
    cursor: pointer;
  }
  .post-card:hover { border-color: var(--gold); transform: translateY(-4px); }
  .post-card.featured { grid-column: span 2; }
  .post-img {
    width: 100%; aspect-ratio: 16/9;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; color: var(--border);
    border-bottom: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  .post-img.featured-img { aspect-ratio: 21/9; }
  .post-img img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.4s ease;
  }
  .post-card:hover .post-img img { transform: scale(1.04); }
  .post-img-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.55) 100%);
    z-index: 1;
  }
  .post-img-bg {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--surface) 0%, #1a1508 100%);
  }
  .post-img-icon { position: relative; z-index: 1; }
  .post-body { padding: 1.5rem; }
  .post-meta {
    display: flex; gap: 1rem; align-items: center;
    margin-bottom: 0.8rem;
  }
  .post-cat {
    font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--gold); border: 1px solid var(--border);
    padding: 0.25rem 0.6rem; border-radius: 2px;
  }
  .post-date { font-size: 0.72rem; color: var(--muted); }
  .post-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; font-weight: 700; color: var(--text);
    line-height: 1.4; margin-bottom: 0.6rem;
  }
  .post-card.featured .post-title { font-size: 1.5rem; }
  .post-excerpt { font-size: 0.85rem; color: var(--muted); line-height: 1.7; margin-bottom: 1.2rem; }
  .post-read {
    font-size: 0.78rem; color: var(--gold); letter-spacing: 0.08em;
    text-transform: uppercase; text-decoration: none;
    display: inline-flex; align-items: center; gap: 0.4rem;
  }
  .post-read::after { content: '→'; transition: transform 0.2s; }
  .post-card:hover .post-read::after { transform: translateX(4px); }
  .post-read-time {
    font-size: 0.7rem; color: #555;
    margin-left: auto;
  }

  /* FOOTER */
  .empty-blog {
    grid-column: 1 / -1;
    text-align: center; padding: 5rem 2rem;
  }
  .empty-blog .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty-blog h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--text); margin-bottom: 0.5rem; }
  .empty-blog p { font-size: 0.9rem; color: var(--muted); }

  /* FOOTER */
  footer {
    padding: 2rem 6%;
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid var(--border);
  }
  footer p { font-size: 0.78rem; color: var(--muted); }
  footer a { color: var(--gold); text-decoration: none; font-size: 0.78rem; margin-left: 1.5rem; }

  /* MOBILE */
  @media (max-width: 768px) {
    .blog-main { grid-template-columns: 1fr; }
    .post-card.featured { grid-column: span 1; }
    .form-row { grid-template-columns: 1fr; }
    nav { padding: 1rem 4%; }
    .nav-links { display: none; }
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeUp 0.6s ease forwards; }
</style>

  function catLabel(cat) {
    const map = { vat: 'VAT & Tax', accounting: 'Accounting', finance: 'Finance', career: 'Career' };
    return map[cat] || cat;
  }

  function renderPosts() {
    const grid = document.getElementById('postsGrid');
    const filtered = activeFilter === 'all' ? posts : posts.filter(p => p.cat === activeFilter);

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-blog">
        <div class="empty-icon">📝</div>
        <h3>No posts in this category yet</h3>
        <p>Check back soon for new articles.</p>
      </div>`;
      return;
    }

    grid.innerHTML = filtered.map((post, i) => `
      <div class="post-card ${post.featured && i === 0 ? 'featured' : ''} fade-in"
           style="animation-delay:${i * 0.08}s"
           onclick="openPost(${post.id})">
        <div class="post-img ${post.featured && i === 0 ? 'featured-img' : ''}">
          ${post.svgThumb || `<div class="post-img-bg"></div><span class="post-img-icon">${post.icon || '📝'}</span>`}

        <div class="post-body">
          <div class="post-meta">
            <span class="post-cat">${catLabel(post.cat)}</span>
            <span class="post-date">${post.date}</span>
            <span class="post-read-time">${post.readTime || '3 min read'}</span>

          <h3 class="post-title">${post.title}</h3>
          <p class="post-excerpt">${post.excerpt}</p>
          <a class="post-read">Read More</a>
        </div>
      </div>
    `).join('');

  function filterPosts(cat, btn) {
    activeFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPosts();
  }

  // Map post id to dedicated article page
  const postPages = {
    1: 'blog_post_uk_vat.html',
    3: 'blog_post_xero.html'
  };

  function openPost(id) {
    if (postPages[id]) {
      window.location.href = postPages[id];
      return;
    }
    const post = posts.find(p => p.id === id);
    if (!post) return;
    const overlay = document.createElement('div');
    overlay.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:500;overflow-y:auto;padding:4rem 6%;`;
    overlay.innerHTML = `
      <div style="max-width:720px;margin:0 auto;">
        <button onclick="this.closest('div[style]').remove()" style="background:none;border:1px solid var(--border);color:var(--muted);padding:0.5rem 1.2rem;border-radius:2px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:2rem;font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;">← Back</button>

      </div>`;
    document.body.appendChild(overlay);
  }
